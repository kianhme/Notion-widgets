<!DOCTYPE html>
<html lang="fa" dir="rtl">

<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>

<title>Countdown Widget</title>

<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>

<link href="https://fonts.googleapis.com/css2?family=Vazirmatn:wght@300;400;600;700&display=swap" rel="stylesheet">

<style>

*{
    box-sizing:border-box;
}

body{
    margin:0;
    background:#0f0f0f;
    color:white;
    font-family:'Vazirmatn',sans-serif;

    display:flex;
    justify-content:center;
    align-items:center;

    min-height:100vh;
}

.widget{
    width:100%;
    max-width:900px;

    padding:30px;
    border-radius:30px;

    background:#171717;

    text-align:center;
}

.title{
    font-size:32px;
    font-weight:700;
    margin-bottom:8px;
}

.subtitle{
    font-size:15px;
    opacity:0.6;
    margin-bottom:35px;
}

.countdown{
    display:flex;
    justify-content:center;
    gap:22px;
    flex-wrap:wrap;
}

.circle{
    width:170px;
    height:170px;
    position:relative;
}

svg{
    width:170px;
    height:170px;
    transform:rotate(-90deg);
}

.bg{
    fill:none;
    stroke:#232323;
    stroke-width:12;
}

.progress{
    fill:none;
    stroke-width:12;
    stroke-linecap:round;

    stroke-dasharray:440;
    stroke-dashoffset:440;

    transition:0.5s;
}

.days{
    stroke:#a3ff12;
}

.hours{
    stroke:#52e3ff;
}

.minutes{
    stroke:#ff00a6;
}

.seconds{
    stroke:#ffb300;
}

.content{
    position:absolute;

    top:50%;
    left:50%;

    transform:translate(-50%,-50%);
}

.number{
    font-size:42px;
    font-weight:700;
    line-height:1;
}

.label{
    margin-top:8px;
    font-size:14px;
    opacity:0.7;
}

.settings-btn{
    margin-top:40px;

    border:none;
    background:#2b2b2b;
    color:white;

    padding:12px 22px;

    border-radius:14px;

    cursor:pointer;

    font-family:'Vazirmatn',sans-serif;
    font-size:15px;

    transition:0.2s;
}

.settings-btn:hover{
    background:#3b3b3b;
}

.settings{
    display:none;

    margin-top:25px;

    background:#1f1f1f;

    border-radius:22px;

    padding:25px;
}

.settings.active{
    display:block;
}

.input-group{
    margin-bottom:18px;
    text-align:right;
}

.input-group label{
    display:block;
    margin-bottom:8px;
    opacity:0.8;
    font-size:14px;
}

input{
    width:100%;

    height:50px;

    border:none;
    outline:none;

    border-radius:14px;

    background:#2a2a2a;

    color:white;

    padding:0 15px;

    font-size:15px;

    font-family:'Vazirmatn',sans-serif;
}

.save-btn{
    border:none;

    background:white;
    color:black;

    padding:13px 24px;

    border-radius:14px;

    cursor:pointer;

    font-family:'Vazirmatn',sans-serif;
    font-weight:700;

    margin-top:10px;
}

</style>
</head>

<body>

<div class="widget">

    <div class="title" id="eventTitle">
        رویداد من
    </div>

    <div class="subtitle">
        باقی مانده
    </div>

    <div class="countdown">

        <!-- Days -->
        <div class="circle">

            <svg>
                <circle class="bg" cx="85" cy="85" r="70"></circle>

                <circle class="progress days"
                id="daysProgress"
                cx="85"
                cy="85"
                r="70"></circle>
            </svg>

            <div class="content">
                <div class="number" id="days">0</div>
                <div class="label">روز</div>
            </div>

        </div>

        <!-- Hours -->
        <div class="circle">

            <svg>
                <circle class="bg" cx="85" cy="85" r="70"></circle>

                <circle class="progress hours"
                id="hoursProgress"
                cx="85"
                cy="85"
                r="70"></circle>
            </svg>

            <div class="content">
                <div class="number" id="hours">0</div>
                <div class="label">ساعت</div>
            </div>

        </div>

        <!-- Minutes -->
        <div class="circle">

            <svg>
                <circle class="bg" cx="85" cy="85" r="70"></circle>

                <circle class="progress minutes"
                id="minutesProgress"
                cx="85"
                cy="85"
                r="70"></circle>
            </svg>

            <div class="content">
                <div class="number" id="minutes">0</div>
                <div class="label">دقیقه</div>
            </div>

        </div>

        <!-- Seconds -->
        <div class="circle">

            <svg>
                <circle class="bg" cx="85" cy="85" r="70"></circle>

                <circle class="progress seconds"
                id="secondsProgress"
                cx="85"
                cy="85"
                r="70"></circle>
            </svg>

            <div class="content">
                <div class="number" id="seconds">0</div>
                <div class="label">ثانیه</div>
            </div>

        </div>

    </div>

    <button class="settings-btn" onclick="toggleSettings()">
        تنظیم تاریخ
    </button>

    <div class="settings" id="settingsBox">

        <div class="input-group">
            <label>عنوان</label>

            <input
            type="text"
            id="titleInput"
            placeholder="مثلا زمان کنکور"
            />
        </div>

        <div class="input-group">
            <label>تاریخ و ساعت</label>

            <input
            type="datetime-local"
            id="dateInput"
            />
        </div>

        <button class="save-btn" onclick="saveCountdown()">
            ذخیره
        </button>

    </div>

</div>

<script>

const FULL_DASH = 440;

let targetDate = null;

function toggleSettings(){

    document
    .getElementById("settingsBox")
    .classList
    .toggle("active");
}

function setProgress(id, percent){

    const offset =
    FULL_DASH - (percent / 100) * FULL_DASH;

    document
    .getElementById(id)
    .style
    .strokeDashoffset = offset;
}

function updateCountdown(){

    if(!targetDate) return;

    const now = new Date().getTime();

    const distance = targetDate - now;

    if(distance <= 0){

        document.getElementById("days").innerText = 0;
        document.getElementById("hours").innerText = 0;
        document.getElementById("minutes").innerText = 0;
        document.getElementById("seconds").innerText = 0;

        return;
    }

    const days =
    Math.floor(distance / (1000 * 60 * 60 * 24));

    const hours =
    Math.floor((distance % (1000 * 60 * 60 * 24))
    / (1000 * 60 * 60));

    const minutes =
    Math.floor((distance % (1000 * 60 * 60))
    / (1000 * 60));

    const seconds =
    Math.floor((distance % (1000 * 60))
    / 1000);

    document.getElementById("days").innerText = days;
    document.getElementById("hours").innerText = hours;
    document.getElementById("minutes").innerText = minutes;
    document.getElementById("seconds").innerText = seconds;

    setProgress("daysProgress",
    Math.min((days / 365) * 100,100));

    setProgress("hoursProgress",
    (hours / 24) * 100);

    setProgress("minutesProgress",
    (minutes / 60) * 100);

    setProgress("secondsProgress",
    (seconds / 60) * 100);
}

function saveCountdown(){

    const title =
    document.getElementById("titleInput").value;

    const date =
    document.getElementById("dateInput").value;

    if(!date) return;

    targetDate = new Date(date).getTime();

    localStorage.setItem("countdownTitle",title);

    localStorage.setItem("countdownDate",date);

    if(title.trim() !== ""){

        document.getElementById("eventTitle")
        .innerText = title;
    }

    document
    .getElementById("settingsBox")
    .classList
    .remove("active");

    updateCountdown();
}

function loadCountdown(){

    const savedTitle =
    localStorage.getItem("countdownTitle");

    const savedDate =
    localStorage.getItem("countdownDate");

    if(savedTitle){

        document.getElementById("eventTitle")
        .innerText = savedTitle;

        document.getElementById("titleInput")
        .value = savedTitle;
    }

    if(savedDate){

        targetDate = new Date(savedDate).getTime();

        document.getElementById("dateInput")
        .value = savedDate;
    }
}

loadCountdown();

updateCountdown();

setInterval(updateCountdown,1000);

</script>

</body>
</html>
