<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Study Counter</title>

<style>

body{
    margin:0;
    height:100vh;
    display:flex;
    justify-content:center;
    align-items:center;
    background:#0f0f0f;
    font-family:sans-serif;
    color:white;
}

.widget{
    width:320px;
    background:#1a1a1a;
    border-radius:24px;
    padding:25px;
    box-sizing:border-box;
}

.title{
    font-size:20px;
    margin-bottom:20px;
}

.counter{
    font-size:60px;
    font-weight:bold;
    text-align:center;
}

.goal{
    text-align:center;
    opacity:0.7;
    margin-bottom:20px;
}

.buttons{
    display:flex;
    gap:12px;
}

button{
    flex:1;
    height:55px;
    border:none;
    border-radius:16px;
    font-size:28px;
    cursor:pointer;
    background:#2a2a2a;
    color:white;
    transition:0.2s;
}

button:hover{
    background:#3a3a3a;
}

.progress-bg{
    width:100%;
    height:14px;
    background:#2a2a2a;
    border-radius:999px;
    margin-top:20px;
    overflow:hidden;
}

.progress{
    height:100%;
    width:0%;
    background:white;
    transition:0.25s;
}

</style>
</head>

<body>

<div class="widget">

    <div class="title">
        Study Pages
    </div>

    <div class="counter" id="counter">
        0
    </div>

    <div class="goal">
        Goal: 20 Pages
    </div>

    <div class="buttons">
        <button onclick="decrease()">
            -
        </button>

        <button onclick="increase()">
            +
        </button>
    </div>

    <div class="progress-bg">
        <div class="progress" id="progress"></div>
    </div>

</div>

<script>

let count = 0;
const maxGoal = 20;

function updateUI(){

    document.getElementById("counter").innerText = count;

    let percent = (count / maxGoal) * 100;

    document.getElementById("progress").style.width = percent + "%";
}

function increase(){

    if(count < maxGoal){
        count++;
        updateUI();
    }
}

function decrease(){

    if(count > 0){
        count--;
        updateUI();
    }
}

updateUI();

</script>

</body>
</html>
